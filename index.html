<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Torneo Calcio a 5 — PwC Milano 2025/2026</title>
<script>
/* anti-flash: applica il tema salvato (o quello di sistema) prima del render */
(function(){try{
  var t=localStorage.getItem('pwc-arena-theme');
  if(!t) t=window.matchMedia&&window.matchMedia('(prefers-color-scheme: light)').matches?'light':'dark';
  document.documentElement.setAttribute('data-theme',t);
}catch(e){document.documentElement.setAttribute('data-theme','dark');}})();
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Barlow:wght@400;500;600;700&family=Barlow+Semi+Condensed:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#070c0a; --bg2:#0b1310; --panel:#0f1a16; --panel2:#13211c;
  --line:rgba(255,255,255,.07); --line2:rgba(255,255,255,.12);
  --ink:#eef4f0; --ink-dim:#9fb2a9; --ink-faint:#6c7f77;
  --pitch:#1fae57; --pitch-deep:#0e7a3a; --pitch-glow:rgba(31,174,87,.35);
  --tang:#EB8C00; --red:#E0301E; --rose:#D93954; --gold:#FFB600;
  --win:#1fae57; --draw:#c9a227; --loss:#e0563e;
  --font-d:'Anton',sans-serif;
  --font-u:'Barlow Semi Condensed','Aptos Narrow','Barlow',sans-serif;
  --font-b:'Barlow','Aptos Narrow',system-ui,sans-serif;
  --r:14px; --r-sm:9px;
  --shadow:0 18px 40px -18px rgba(0,0,0,.7);
  /* themeable surfaces (overridden in light) */
  --hero-bg:linear-gradient(135deg,#0c1a14,#0a120f 60%);
  --hero-title:linear-gradient(110deg,#fff 30%,#ffd9a8 60%,var(--tang));
  --winner-ink:#fff;
  --bg-radial-a:rgba(235,140,0,.10); --bg-radial-b:rgba(31,174,87,.13);
  --bg-base:linear-gradient(180deg,#081310,#070c0a 60%);
  --scan:rgba(255,255,255,.012); --scan-op:.5;
}
:root[data-theme="light"]{
  --bg:#eef2ec; --bg2:#e6ece4; --panel:#ffffff; --panel2:#f5f9f3;
  --line:rgba(16,40,28,.10); --line2:rgba(16,40,28,.17);
  --ink:#13241b; --ink-dim:#46584e; --ink-faint:#7c8c83;
  --pitch:#159a48; --pitch-deep:#0c6e34; --pitch-glow:rgba(21,154,72,.22);
  --tang:#D97E00; --red:#C8261A; --rose:#C42D49; --gold:#D69500;
  --win:#0f9a43; --draw:#9a7b14; --loss:#cf4528;
  --shadow:0 16px 34px -20px rgba(20,50,35,.40);
  --hero-bg:linear-gradient(135deg,#dff0e4,#eef6ea 60%);
  --hero-title:linear-gradient(110deg,#0c2a18 28%,#0c6e34 62%,var(--tang));
  --winner-ink:#0a1b12;
  --bg-radial-a:rgba(235,140,0,.13); --bg-radial-b:rgba(31,174,87,.16);
  --bg-base:linear-gradient(180deg,#f2f6ef,#e8efe6 60%);
  --scan:rgba(16,40,28,.018); --scan-op:.6;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  background:var(--bg); color:var(--ink); font-family:var(--font-b);
  font-size:15px; line-height:1.5; -webkit-font-smoothing:antialiased;
  min-height:100vh; overflow-x:hidden;
}
body::before{
  content:""; position:fixed; inset:0; z-index:-2;
  background:
    radial-gradient(1100px 620px at 78% -8%, var(--bg-radial-a), transparent 60%),
    radial-gradient(900px 600px at 12% 4%, var(--bg-radial-b), transparent 58%),
    var(--bg-base);
}
body::after{
  content:""; position:fixed; inset:0; z-index:-1; opacity:var(--scan-op); pointer-events:none;
  background-image:repeating-linear-gradient(0deg,transparent 0 38px,var(--scan) 38px 39px);
}
a{color:inherit;text-decoration:none}
body,.panel,.kpi,.match,.tcard,.tstat,.tie,.hero,.team-hero,header.top,nav.tabs a,.searchbtn,.themebtn,.seg,select.fsel{transition:background-color .35s ease,border-color .35s ease,color .35s ease,box-shadow .35s ease}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
::selection{background:var(--tang);color:#1a0f00}
.wrap{max-width:1180px;margin:0 auto;padding:0 22px}

/* ---------- TOP NAV ---------- */
header.top{
  position:sticky;top:0;z-index:50;
  backdrop-filter:blur(16px);
  background:linear-gradient(180deg,rgba(7,12,10,.92),rgba(7,12,10,.74));
  border-bottom:1px solid var(--line);
}
.topbar{display:flex;align-items:center;gap:18px;height:62px}
.brand{display:flex;align-items:center;gap:11px;cursor:pointer;flex-shrink:0}
.brand .mark{
  width:34px;height:34px;border-radius:9px;flex-shrink:0;
  background:conic-gradient(from 220deg,var(--tang),var(--red) 40%,var(--rose) 70%,var(--gold));
  display:grid;place-items:center;font-family:var(--font-d);font-size:18px;color:#1a0f00;
  box-shadow:0 0 0 1px rgba(255,255,255,.12),0 6px 18px -6px var(--tang);
}
.brand b{font-family:var(--font-u);font-weight:700;letter-spacing:.04em;font-size:15.5px;line-height:1}
.brand small{display:block;color:var(--ink-faint);font-size:10.5px;letter-spacing:.14em;text-transform:uppercase}
nav.tabs{display:flex;gap:2px;margin-left:auto;flex-wrap:wrap}
nav.tabs a{
  font-family:var(--font-u);font-weight:600;font-size:13.5px;letter-spacing:.03em;
  padding:8px 13px;border-radius:8px;color:var(--ink-dim);text-transform:uppercase;
  transition:.16s;white-space:nowrap;position:relative;
}
nav.tabs a:hover{color:var(--ink);background:rgba(255,255,255,.04)}
nav.tabs a.active{color:var(--ink)}
nav.tabs a.active::after{
  content:"";position:absolute;left:13px;right:13px;bottom:1px;height:2px;border-radius:2px;
  background:linear-gradient(90deg,var(--tang),var(--rose));
}
.searchbtn{
  display:flex;align-items:center;gap:7px;border:1px solid var(--line2);border-radius:9px;
  padding:7px 11px;color:var(--ink-dim);font-family:var(--font-u);font-size:12.5px;
  transition:.16s;background:rgba(255,255,255,.02)
}
.searchbtn:hover{border-color:var(--tang);color:var(--ink)}
.searchbtn kbd{font-family:var(--font-u);font-size:10px;border:1px solid var(--line2);border-radius:4px;padding:1px 5px;color:var(--ink-faint)}
.themebtn{display:grid;place-items:center;width:38px;height:38px;border-radius:9px;border:1px solid var(--line2);
  background:rgba(255,255,255,.02);font-size:17px;line-height:1;transition:.16s;flex-shrink:0;overflow:hidden;position:relative}
.themebtn:hover{border-color:var(--tang);transform:rotate(-12deg)}
.themebtn .ic{transition:transform .35s cubic-bezier(.2,.8,.2,1),opacity .25s}

/* ---------- GENERIC ---------- */
.view{padding:34px 0 80px;animation:fade .4s ease}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.eyebrow{font-family:var(--font-u);font-weight:700;letter-spacing:.22em;text-transform:uppercase;font-size:11px;color:var(--tang)}
h1.page{font-family:var(--font-d);font-size:clamp(34px,6vw,60px);line-height:.92;letter-spacing:.005em;margin:6px 0 4px;text-transform:uppercase}
.page-sub{color:var(--ink-dim);font-size:14.5px;max-width:60ch}
.section-head{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin:0 0 18px;flex-wrap:wrap}
.htitle{font-family:var(--font-d);font-size:22px;letter-spacing:.02em;text-transform:uppercase;display:flex;align-items:center;gap:10px}
.htitle .bar{width:5px;height:22px;border-radius:3px;background:linear-gradient(var(--tang),var(--rose))}
.panel{background:linear-gradient(180deg,var(--panel),var(--bg2));border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow)}
.chip{display:inline-flex;align-items:center;gap:6px;font-family:var(--font-u);font-weight:600;font-size:11.5px;letter-spacing:.05em;text-transform:uppercase;padding:4px 9px;border-radius:999px;border:1px solid var(--line2);color:var(--ink-dim)}
.chip.live{color:var(--red);border-color:rgba(224,48,30,.4);background:rgba(224,48,30,.08)}
.chip.q{color:#062;background:var(--pitch);border:none;color:#04210f;font-weight:700}
.muted{color:var(--ink-faint)}
.linkish{color:var(--tang);font-family:var(--font-u);font-weight:600;font-size:13px;letter-spacing:.03em;cursor:pointer}
.linkish:hover{text-decoration:underline}
.tlink{cursor:pointer;border-bottom:1px solid transparent;transition:.14s}
.tlink:hover{border-color:var(--tang);color:var(--ink)}

/* ---------- HOME HERO ---------- */
.hero{position:relative;border-radius:20px;overflow:hidden;border:1px solid var(--line);
  background:var(--hero-bg);padding:42px 38px 38px;margin-bottom:30px}
.hero .pitch-deco{position:absolute;inset:0;z-index:0;opacity:.5;pointer-events:none}
.hero-inner{position:relative;z-index:1}
.hero h1{font-family:var(--font-d);font-size:clamp(40px,8vw,86px);line-height:.86;text-transform:uppercase;letter-spacing:.01em;
  background:var(--hero-title);-webkit-background-clip:text;background-clip:text;color:transparent;margin:10px 0 14px}
.hero .season{font-family:var(--font-u);font-weight:700;letter-spacing:.34em;color:var(--ink-dim);font-size:13px;text-transform:uppercase}
.hero .meta{display:flex;gap:18px;flex-wrap:wrap;color:var(--ink-dim);font-size:13.5px;margin-top:8px}
.hero .meta b{color:var(--ink);font-weight:600}
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin-bottom:30px}
.kpi{background:linear-gradient(180deg,var(--panel),var(--bg2));border:1px solid var(--line);border-radius:var(--r);padding:18px 18px 16px;position:relative;overflow:hidden}
.kpi::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent,var(--tang))}
.kpi .n{font-family:var(--font-d);font-size:40px;line-height:1;color:var(--ink)}
.kpi .l{font-family:var(--font-u);font-weight:600;text-transform:uppercase;letter-spacing:.08em;font-size:11.5px;color:var(--ink-dim);margin-top:6px}
.kpi .sub{font-size:11.5px;color:var(--ink-faint);margin-top:3px}
.home-grid{display:grid;grid-template-columns:1.4fr 1fr;gap:22px;margin-top:8px}
@media(max-width:860px){.home-grid{grid-template-columns:1fr}.home-grid .full{grid-column:1}}

/* progress */
.prog{height:9px;border-radius:6px;background:rgba(255,255,255,.07);overflow:hidden;margin-top:10px}
.prog>i{display:block;height:100%;border-radius:6px;background:linear-gradient(90deg,var(--pitch),var(--gold));transition:width 1s cubic-bezier(.2,.8,.2,1)}

/* ---------- TABLES ---------- */
.tablewrap{overflow-x:auto;border-radius:var(--r)}
table{width:100%;border-collapse:collapse;font-size:14px}
thead th{font-family:var(--font-u);font-weight:700;text-transform:uppercase;letter-spacing:.06em;font-size:11px;color:var(--ink-faint);
  text-align:center;padding:10px 8px;border-bottom:1px solid var(--line2);white-space:nowrap}
thead th.l,tbody td.l{text-align:left}
tbody td{padding:10px 8px;text-align:center;border-bottom:1px solid var(--line);white-space:nowrap}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover{background:rgba(255,255,255,.025)}
td.team-cell{text-align:left;font-family:var(--font-u);font-weight:600;font-size:14.5px}
.pts{font-family:var(--font-d);font-size:18px}
.posbadge{display:inline-grid;place-items:center;width:24px;height:24px;border-radius:7px;font-family:var(--font-u);font-weight:700;font-size:13px;background:rgba(255,255,255,.06)}
tr.qual td{background:linear-gradient(90deg,rgba(31,174,87,.10),transparent 60%)}
tr.qual .posbadge{background:var(--pitch);color:#04210f}
.gd-pos{color:var(--win)}.gd-neg{color:var(--loss)}

/* group standings grid */
.grp-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(330px,1fr));gap:18px}
.grp-card{padding:0;overflow:hidden}
.grp-head{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;border-bottom:1px solid var(--line2);
  background:linear-gradient(90deg,rgba(235,140,0,.07),transparent)}
.grp-head .gl{font-family:var(--font-d);font-size:22px;display:flex;align-items:center;gap:9px}
.grp-head .gl .dot{width:26px;height:26px;border-radius:8px;background:linear-gradient(135deg,var(--tang),var(--rose));display:grid;place-items:center;font-size:15px;color:#1a0f00}

/* ---------- TEAM PILL / FORM ---------- */
.form-row{display:inline-flex;gap:3px}
.fp{width:18px;height:18px;border-radius:5px;font-family:var(--font-u);font-weight:700;font-size:10.5px;display:grid;place-items:center;color:#04210f}
.fp.V{background:var(--win)}.fp.N{background:var(--draw);color:#251c00}.fp.P{background:var(--loss);color:#2a0a04}
.fp.x{background:rgba(255,255,255,.08);color:var(--ink-faint)}

/* ---------- MATCH CARDS ---------- */
.matchday{margin-bottom:26px}
.md-label{display:flex;align-items:center;gap:12px;margin:0 0 12px}
.md-label h3{font-family:var(--font-d);font-size:18px;text-transform:uppercase;letter-spacing:.03em}
.md-label .ln{flex:1;height:1px;background:var(--line2)}
.match-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:12px}
.match{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:10px;padding:14px 15px;
  background:linear-gradient(180deg,var(--panel),var(--bg2));border:1px solid var(--line);border-radius:var(--r);transition:.16s;position:relative;overflow:hidden}
.match:hover{border-color:var(--line2);transform:translateY(-2px)}
.match .side{display:flex;flex-direction:column;gap:3px;min-width:0}
.match .side.away{align-items:flex-end;text-align:right}
.match .tn{font-family:var(--font-u);font-weight:600;font-size:14px;line-height:1.15;overflow:hidden;text-overflow:ellipsis}
.match .gir{font-size:10.5px;color:var(--ink-faint);font-family:var(--font-u);letter-spacing:.05em}
.match .score{font-family:var(--font-d);font-size:26px;line-height:1;letter-spacing:.02em;padding:0 4px;min-width:64px;text-align:center}
.match .score.tbd{font-size:13px;color:var(--ink-faint);font-family:var(--font-u);font-weight:600}
.match .vbar{font-size:11px;color:var(--ink-faint);text-align:center}
.match .topstrip{position:absolute;top:0;left:0;right:0;height:2px}
.match.win-in .topstrip{background:linear-gradient(90deg,var(--win),transparent)}
.match.win-out .topstrip{background:linear-gradient(270deg,var(--win),transparent)}
.match.draw .topstrip{background:linear-gradient(90deg,transparent,var(--draw),transparent)}
.match .foot{grid-column:1/-1;display:flex;align-items:center;justify-content:space-between;gap:8px;margin-top:9px;padding-top:9px;border-top:1px solid var(--line);font-size:11px;color:var(--ink-faint);font-family:var(--font-u);letter-spacing:.03em}
.tav{color:var(--gold)!important}
.winner{color:var(--winner-ink);font-weight:700}

/* filters */
.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:22px;align-items:center}
.seg{display:inline-flex;background:rgba(255,255,255,.04);border:1px solid var(--line);border-radius:10px;padding:3px;gap:2px;flex-wrap:wrap}
.seg button{font-family:var(--font-u);font-weight:600;font-size:12.5px;letter-spacing:.03em;padding:6px 12px;border-radius:7px;color:var(--ink-dim);transition:.14s;text-transform:uppercase}
.seg button:hover{color:var(--ink)}
.seg button.on{background:linear-gradient(135deg,var(--tang),var(--rose));color:#1a0f00}
select.fsel{font-family:var(--font-u);font-weight:600;font-size:13px;background:var(--panel);color:var(--ink);border:1px solid var(--line2);border-radius:9px;padding:7px 11px;cursor:pointer}

/* ---------- SCORERS ---------- */
.podium{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:24px}
@media(max-width:640px){.podium{grid-template-columns:1fr}}
.pod{padding:20px 18px;border-radius:var(--r);border:1px solid var(--line);position:relative;overflow:hidden;
  background:linear-gradient(180deg,var(--panel),var(--bg2))}
.pod .rank{font-family:var(--font-d);font-size:54px;line-height:.8;color:rgba(255,255,255,.10);position:absolute;top:10px;right:16px}
.pod.p1{border-color:rgba(255,182,0,.4);background:linear-gradient(180deg,rgba(255,182,0,.10),var(--bg2))}
.pod.p2{border-color:rgba(200,210,220,.25)}
.pod.p3{border-color:rgba(205,127,50,.3)}
.pod .medal{font-size:22px}
.pod .pn{font-family:var(--font-u);font-weight:700;font-size:18px;margin-top:8px}
.pod .pt{color:var(--ink-dim);font-size:13px;margin-top:2px}
.pod .pg{font-family:var(--font-d);font-size:38px;margin-top:8px;color:var(--gold)}
.pod .pg small{font-family:var(--font-u);font-size:13px;color:var(--ink-dim);letter-spacing:.05em}
.goalbar{height:6px;border-radius:4px;background:rgba(255,255,255,.07);overflow:hidden;margin-top:7px;width:120px}
.goalbar>i{display:block;height:100%;background:linear-gradient(90deg,var(--tang),var(--gold))}

/* ---------- TEAMS GRID ---------- */
.teams-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:14px}
.tcard{padding:16px;border-radius:var(--r);border:1px solid var(--line);background:linear-gradient(180deg,var(--panel),var(--bg2));
  cursor:pointer;transition:.18s;position:relative;overflow:hidden}
.tcard:hover{transform:translateY(-3px);border-color:var(--line2);box-shadow:var(--shadow)}
.tcard .crest{width:46px;height:46px;border-radius:12px;display:grid;place-items:center;font-family:var(--font-d);font-size:18px;color:#04130b;margin-bottom:12px}
.tcard h4{font-family:var(--font-u);font-weight:700;font-size:16px;line-height:1.1}
.tcard .cap{font-size:12px;color:var(--ink-faint);margin-top:4px}
.tcard .row{display:flex;align-items:center;justify-content:space-between;margin-top:13px;padding-top:11px;border-top:1px solid var(--line)}
.tcard .row .st{text-align:center}
.tcard .row .st b{font-family:var(--font-d);font-size:18px;display:block}
.tcard .row .st span{font-size:9.5px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-faint);font-family:var(--font-u)}
.grp-tag{position:absolute;top:14px;right:14px;font-family:var(--font-d);font-size:14px;color:rgba(255,255,255,.14)}

/* ---------- TEAM DETAIL ---------- */
.crumbs{display:flex;align-items:center;gap:8px;color:var(--ink-faint);font-family:var(--font-u);font-size:13px;margin-bottom:16px}
.crumbs .linkish{font-size:13px}
.team-hero{display:flex;gap:22px;align-items:center;padding:26px;border-radius:18px;border:1px solid var(--line);
  background:var(--hero-bg);margin-bottom:22px;flex-wrap:wrap}
.team-hero .crest{width:78px;height:78px;border-radius:18px;display:grid;place-items:center;font-family:var(--font-d);font-size:30px;color:#04130b;flex-shrink:0}
.team-hero h1{font-family:var(--font-d);font-size:clamp(28px,5vw,46px);text-transform:uppercase;line-height:.95}
.team-hero .meta{display:flex;gap:9px;flex-wrap:wrap;margin-top:8px}
.tstat-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(92px,1fr));gap:11px;margin-bottom:22px}
.tstat{padding:14px;border-radius:var(--r);border:1px solid var(--line);background:var(--panel);text-align:center}
.tstat b{font-family:var(--font-d);font-size:26px;display:block}
.tstat span{font-size:10.5px;text-transform:uppercase;letter-spacing:.07em;color:var(--ink-faint);font-family:var(--font-u)}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:18px}
@media(max-width:780px){.two-col{grid-template-columns:1fr}}
.roster{list-style:none;display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--line);border-radius:var(--r);overflow:hidden}
@media(max-width:520px){.roster{grid-template-columns:1fr}}
.roster li{background:var(--panel);padding:10px 14px;font-size:14px;display:flex;align-items:center;gap:10px;font-family:var(--font-u);font-weight:500}
.roster li .num{width:22px;height:22px;border-radius:6px;background:rgba(255,255,255,.06);display:grid;place-items:center;font-size:11px;color:var(--ink-faint);flex-shrink:0}
.roster li.iscap{background:linear-gradient(90deg,rgba(235,140,0,.12),var(--panel))}
.roster li .capbadge{margin-left:auto;font-size:9.5px;font-family:var(--font-u);font-weight:700;letter-spacing:.06em;color:var(--tang);border:1px solid rgba(235,140,0,.4);padding:1px 6px;border-radius:5px}
.roster li .gtag{margin-left:auto;font-family:var(--font-d);font-size:14px;color:var(--gold)}

/* ---------- BRACKET ---------- */
.bracket{display:flex;gap:26px;overflow-x:auto;padding:8px 2px 20px}
.round{display:flex;flex-direction:column;justify-content:space-around;gap:14px;min-width:230px;flex-shrink:0}
.round-h{font-family:var(--font-d);font-size:15px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-dim);text-align:center;margin-bottom:4px;padding-bottom:8px;border-bottom:1px solid var(--line2)}
.tie{background:linear-gradient(180deg,var(--panel),var(--bg2));border:1px solid var(--line);border-radius:var(--r-sm);overflow:hidden}
.tie .t{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:9px 12px;font-family:var(--font-u);font-weight:600;font-size:13px}
.tie .t+.t{border-top:1px solid var(--line)}
.tie .t.adv{color:var(--winner-ink);font-weight:700}.tie .t.adv .sc{color:var(--win)}
.tie .t .sc{font-family:var(--font-d);font-size:16px;color:var(--ink-faint)}
.tie .t.tbdname{color:var(--ink-faint);font-style:normal}
.tie .when{padding:6px 12px;font-size:10.5px;color:var(--ink-faint);font-family:var(--font-u);letter-spacing:.04em;border-top:1px solid var(--line);background:rgba(255,255,255,.02)}
.final-card{background:linear-gradient(180deg,rgba(255,182,0,.1),var(--bg2));border-color:rgba(255,182,0,.35)}

/* ---------- STATS ---------- */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:18px}
.chartcard{padding:18px}
.chartcard h4{font-family:var(--font-u);font-weight:700;text-transform:uppercase;letter-spacing:.05em;font-size:13px;color:var(--ink-dim);margin-bottom:4px}
.chartcard .cdesc{font-size:11.5px;color:var(--ink-faint);margin-bottom:14px}
.leaderlist{list-style:none}
.leaderlist li{display:flex;align-items:center;gap:12px;padding:9px 0;border-bottom:1px solid var(--line);font-family:var(--font-u)}
.leaderlist li:last-child{border:none}
.leaderlist .lrank{font-family:var(--font-d);font-size:15px;color:var(--ink-faint);width:22px}
.leaderlist .lname{font-weight:600;font-size:14px;flex:1}
.leaderlist .lval{font-family:var(--font-d);font-size:18px;color:var(--tang)}
svg .axis{stroke:var(--line2);stroke-width:1}
svg text{font-family:var(--font-u);fill:var(--ink-dim)}

/* ---------- SEARCH MODAL ---------- */
.modal{position:fixed;inset:0;z-index:100;display:none;align-items:flex-start;justify-content:center;padding-top:14vh;
  background:rgba(0,0,0,.6);backdrop-filter:blur(6px)}
.modal.open{display:flex;animation:fade .2s}
.searchbox{width:min(560px,92vw);background:var(--panel2);border:1px solid var(--line2);border-radius:16px;overflow:hidden;box-shadow:0 30px 80px -20px #000}
.searchbox input{width:100%;background:none;border:none;outline:none;color:var(--ink);font-family:var(--font-u);font-size:18px;padding:18px 20px;border-bottom:1px solid var(--line)}
.searchbox input::placeholder{color:var(--ink-faint)}
.results{max-height:50vh;overflow-y:auto}
.results .res{display:flex;align-items:center;gap:12px;padding:11px 18px;cursor:pointer;border-bottom:1px solid var(--line)}
.results .res:hover,.results .res.sel{background:rgba(235,140,0,.1)}
.results .res .ic{width:30px;height:30px;border-radius:8px;display:grid;place-items:center;font-family:var(--font-d);font-size:13px;flex-shrink:0}
.results .res .rt{font-family:var(--font-u);font-weight:600;font-size:14.5px}
.results .res .rs{font-size:11.5px;color:var(--ink-faint)}
.results .res .kind{margin-left:auto;font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-faint);font-family:var(--font-u)}
.empty{padding:30px;text-align:center;color:var(--ink-faint);font-family:var(--font-u)}

footer{border-top:1px solid var(--line);padding:26px 0 50px;color:var(--ink-faint);font-size:12px;font-family:var(--font-u)}
footer .wrap{display:flex;justify-content:space-between;gap:14px;flex-wrap:wrap;align-items:center}
.scroll-top{position:fixed;right:20px;bottom:20px;width:42px;height:42px;border-radius:12px;background:var(--panel2);border:1px solid var(--line2);display:none;place-items:center;z-index:40;font-size:18px;color:var(--ink-dim)}
.scroll-top.show{display:grid}
@media(max-width:560px){
  nav.tabs a{padding:7px 9px;font-size:12px}
  .brand small{display:none}
  .searchbtn span{display:none}
  .hero{padding:30px 22px}
}
</style>

<script>
"use strict";
/* ============================================================
   PWC ARENA — Tournament Hub (single file)
   Struttura: dati grezzi nel tag <script id="data"> →
   compute() ricalcola classifiche/marcatori/statistiche a runtime →
   router hash (#/...) renderizza le viste. Niente backend.
   ============================================================ */
const RAW = JSON.parse(document.getElementById('data').textContent);

/* ---------- helpers ---------- */
const $ = s=>document.querySelector(s);
const el = (h)=>{const d=document.createElement('div');d.innerHTML=h.trim();return d.firstElementChild;};
const esc = s=>String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
function nameFromEmail(e){
  if(!e||typeof e!=='string'||!e.includes('@')) return e||'';
  return e.split('@')[0].split('.').map(p=> p.length===1 ? p.toUpperCase()+'.' : p.charAt(0).toUpperCase()+p.slice(1).toLowerCase()).join(' ');
}
const slug = s=>encodeURIComponent(s);
const unslug = s=>decodeURIComponent(s);
function initials(name){return name.split(/\s+/).filter(Boolean).slice(0,2).map(w=>w[0]).join('').toUpperCase();}
/* deterministic crest gradient per team */
function crestStyle(name){
  let h=0; for(const c of name) h=(h*31+c.charCodeAt(0))%360;
  const h2=(h+38)%360;
  return `background:linear-gradient(135deg,hsl(${h} 62% 55%),hsl(${h2} 70% 46%))`;
}
const DOW={'lunedì':'lun','martedì':'mar','mercoledì':'mer','giovedì':'gio','venerdì':'ven','sabato':'sab','domenica':'dom'};
function fmtDate(iso,giorno){
  if(!iso) return '—';
  const d=new Date(iso+'T00:00:00');
  const day=d.getDate(), mon=['gen','feb','mar','apr','mag','giu','lug','ago','set','ott','nov','dic'][d.getMonth()];
  return `${(DOW[giorno]||'')} ${day} ${mon}`.trim();
}

/* ============================================================
   COMPUTE — derive everything from RAW
   ============================================================ */
const GROUP_MD=['1','2','3','4','5'];
const KO_ORDER=['Ottavi di finale','Quarti di finale','Semifinale','Finale 3°- 4°','Finale 1°- 2°'];
let DB={};
function compute(){
  const teams={}; // name -> {name,group,captain,pos}
  for(const [name,info] of Object.entries(RAW.captains)){
    teams[name]={name,group:info.girone,captain:info.captain,posLabel:info.pos};
  }
  // stats skeleton
  const stat={};
  for(const n in teams) stat[n]={team:n,group:teams[n].group,P:0,G:0,V:0,N:0,Pr:0,GF:0,GS:0,Y:0,R:0,form:[],matches:[]};

  const played=RAW.matches.filter(m=>m.played);
  for(const m of RAW.matches){
    const inP=GROUP_MD.includes(m.giornata);
    if(stat[m.teamIn]) stat[m.teamIn].matches.push(m);
    if(stat[m.teamOut]) stat[m.teamOut].matches.push(m);
    if(!m.played||!inP) continue;
    const a=m.teamIn,b=m.teamOut,ga=m.goalIn,gb=m.goalOut;
    [[a,ga,gb,m.yIn,m.rIn],[b,gb,ga,m.yOut,m.rOut]].forEach(([t,gf,gs,y,r])=>{
      const s=stat[t]; if(!s)return; s.G++; s.GF+=gf; s.GS+=gs; s.Y+=y; s.R+=r;
    });
    if(ga>gb){stat[a].V++;stat[a].P+=3;stat[b].Pr++;stat[a].form.push(['V',m]);stat[b].form.push(['P',m]);}
    else if(gb>ga){stat[b].V++;stat[b].P+=3;stat[a].Pr++;stat[b].form.push(['V',m]);stat[a].form.push(['P',m]);}
    else{stat[a].N++;stat[b].N++;stat[a].P++;stat[b].P++;stat[a].form.push(['N',m]);stat[b].form.push(['N',m]);}
  }
  for(const n in stat) stat[n].GD=stat[n].GF-stat[n].GS;

  // groups + standings with head-to-head tiebreak
  const groups={};
  for(const n in teams){(groups[teams[n].group]=groups[teams[n].group]||[]).push(n);}
  const standings={};
  for(const g in groups){
    standings[g]=sortGroup(groups[g],stat,played);
  }

  // scorers aggregate
  const sc={};
  for(const r of RAW.scorers){
    if(!sc[r.player]) sc[r.player]={player:r.player,team:r.squadra,goals:0,games:new Set()};
    sc[r.player].goals+=r.gol; sc[r.player].games.add(r.partita);
  }
  const scorers=Object.values(sc).map(s=>({...s,games:s.games.size}))
    .sort((a,b)=> b.goals-a.goals || a.player.localeCompare(b.player));

  // global numbers
  const totGoals=played.reduce((s,m)=>s+m.goalIn+m.goalOut,0);
  const totCards={y:played.reduce((s,m)=>s+m.yIn+m.yOut,0),r:played.reduce((s,m)=>s+m.rIn+m.rOut,0)};
  const nextMatch=RAW.matches.filter(m=>!m.played).sort((a,b)=>(a.date||'').localeCompare(b.date)||a.n-b.n)[0];

  DB={teams,stat,groups,standings,scorers,played,totGoals,totCards,nextMatch};
}
function h2hKey(a,b){return a<b?a+'|'+b:b+'|'+a;}
function sortGroup(names,stat,played){
  // group played matches among these teams
  const set=new Set(names);
  const inter=played.filter(m=>set.has(m.teamIn)&&set.has(m.teamOut)&&GROUP_MD.includes(m.giornata));
  return [...names].sort((A,B)=>{
    const a=stat[A],b=stat[B];
    if(b.P!==a.P) return b.P-a.P;
    // head-to-head mini league among teams tied on points with these two (simplified pairwise+mini)
    const tied=names.filter(n=>stat[n].P===a.P);
    if(tied.length>1){
      const mini=miniTable(tied,inter);
      const ma=mini[A],mb=mini[B];
      if(mb.P!==ma.P) return mb.P-ma.P;
      if((mb.GF-mb.GS)!==(ma.GF-ma.GS)) return (mb.GF-mb.GS)-(ma.GF-ma.GS);
      if(mb.GF!==ma.GF) return mb.GF-ma.GF;
    }
    if(b.GD!==a.GD) return b.GD-a.GD;
    if(b.GF!==a.GF) return b.GF-a.GF;
    if(a.R!==b.R) return a.R-b.R;
    if(a.Y!==b.Y) return a.Y-b.Y;
    return A.localeCompare(B);
  });
}
function miniTable(names,inter){
  const t={}; names.forEach(n=>t[n]={P:0,GF:0,GS:0});
  const set=new Set(names);
  inter.filter(m=>set.has(m.teamIn)&&set.has(m.teamOut)).forEach(m=>{
    const a=m.teamIn,b=m.teamOut,ga=m.goalIn,gb=m.goalOut;
    t[a].GF+=ga;t[a].GS+=gb;t[b].GF+=gb;t[b].GS+=ga;
    if(ga>gb)t[a].P+=3; else if(gb>ga)t[b].P+=3; else {t[a].P++;t[b].P++;}
  });
  return t;
}

/* ============================================================
   ROUTER
   ============================================================ */
const NAV=[
  ['/','Home'],['/calendario','Calendario'],['/classifiche','Classifiche'],
  ['/marcatori','Marcatori'],['/tabellone','Tabellone'],['/squadre','Squadre'],['/statistiche','Statistiche']
];
function buildNav(){
  $('#tabs').innerHTML=NAV.map(([h,l])=>`<a href="#${h}" data-h="${h}">${l}</a>`).join('');
}
function setActive(path){
  const base='/'+(path.split('/')[1]||'');
  document.querySelectorAll('#tabs a').forEach(a=>a.classList.toggle('active',a.dataset.h===(base==='/'?'/':base)));
}
function go(path){location.hash='#'+path;}
function router(){
  let path=location.hash.replace(/^#/,'')||'/';
  setActive(path);
  const parts=path.split('/').filter(Boolean);
  const app=$('#app');
  let html='';
  if(parts.length===0) html=viewHome();
  else if(parts[0]==='calendario') html=viewCalendario();
  else if(parts[0]==='classifiche') html=viewClassifiche();
  else if(parts[0]==='marcatori') html=viewMarcatori();
  else if(parts[0]==='tabellone') html=viewTabellone();
  else if(parts[0]==='squadre' && parts[1]) html=viewTeam(unslug(parts[1]));
  else if(parts[0]==='squadre') html=viewSquadre();
  else if(parts[0]==='statistiche') html=viewStatistiche();
  else html=viewHome();
  app.innerHTML=html;
  window.scrollTo({top:0});
  // post-render hooks (charts/animations)
  requestAnimationFrame(()=>{ animateBars(); });
}
window.addEventListener('hashchange',router);

/* ============================================================
   VIEWS
   ============================================================ */
function teamLink(name,cls=''){return `<span class="tlink ${cls}" onclick="go('/squadre/${slug(name)}')">${esc(name)}</span>`;}
function pitchSVG(){
  return `<svg class="pitch-deco" viewBox="0 0 800 360" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">

      <rect x="40" y="30" width="720" height="300" rx="6"/>
      <line x1="400" y1="30" x2="400" y2="330"/>
      <circle cx="400" cy="180" r="58"/>
      <circle cx="400" cy="180" r="3" fill="rgba(31,174,87,.4)" stroke="none"/>
      <rect x="40" y="95" width="92" height="170" rx="2"/>
      <rect x="668" y="95" width="92" height="170" rx="2"/>
      <rect x="40" y="140" width="34" height="80" rx="2"/>
      <rect x="726" y="140" width="34" height="80" rx="2"/>
    </g>
  </svg>`;
}

function viewHome(){
  const m=RAW.meta, totM=RAW.matches.length, playedN=DB.played.length;
  const pct=Math.round(playedN/80*100); // 80 group matches
  const top=DB.scorers[0];
  const topTeam=Object.values(DB.stat).sort((a,b)=>b.P-a.P||b.GD-a.GD)[0];
  const bestAtt=Object.values(DB.stat).sort((a,b)=>b.GF-a.GF)[0];

    </div>

    <div class="kpi-row">
      <div class="kpi" style="--accent:var(--pitch)"><div class="n">${playedN}<span style="font-size:18px;color:var(--ink-faint)">/80</span></div><div class="l">Partite gironi</div><div class="prog"><i style="width:0" data-w="${pct}%"></i></div></div>
      <div class="kpi" style="--accent:var(--gold)"><div class="n">${DB.totGoals}</div><div class="l">Gol totali</div><div class="sub">${(DB.totGoals/playedN).toFixed(1)} a partita</div></div>
      <div class="kpi" style="--accent:var(--tang)"><div class="n">${top.goals}</div><div class="l">Capocannoniere</div><div class="sub linkish" onclick="go('/squadre/${slug(top.team)}')">${esc(nameFromEmail(top.player))}</div></div>

            </div>
            <div class="muted" style="font-size:13px;font-family:var(--font-u)">📅 ${fmtDate(nm.date,nm.giorno)} · 🕗 ${esc(nm.orario)}</div>
            <div class="muted" style="font-size:12px;font-family:var(--font-u);margin-top:3px">${esc(nm.campo||'')}</div>
          </div>`:'<div class="empty">Calendario completato</div>'}
        </div>
        <div class="panel" style="padding:20px">
          <div class="htitle" style="font-size:17px;margin-bottom:8px"><span class="bar"></span>Miglior attacco</div>
          <div style="display:flex;align-items:center;gap:12px;margin-top:8px">
            <div class="crest" style="width:42px;height:42px;border-radius:11px;display:grid;place-items:center;font-family:var(--font-d);color:#04130b;${crestStyle(bestAtt.team)}">${initials(bestAtt.team)}</div>

}

function matchCard(m){
  const played=m.played;
  let cls='';
  if(played){ if(m.goalIn>m.goalOut)cls='win-in'; else if(m.goalOut>m.goalIn)cls='win-out'; else cls='draw'; }
  const tav=m.note&&/tavolino/i.test(m.note);
  return `<div class="match ${cls}">
    <div class="topstrip"></div>
    <div class="side home">
      <span class="tn ${played&&m.goalIn>=m.goalOut?'winner':''}">${m.teamIn?teamLink(m.teamIn):'<span class="muted">—</span>'}</span>
      <span class="gir">${m.girone?'Girone '+esc(m.girone.replace(' - ',' / ')):esc(m.giornata)}</span>
    </div>
    <div class="${played?'score':'score tbd'}">${played?`${m.goalIn}<span style="opacity:.4">–</span>${m.goalOut}`:'<div>'+fmtDate(m.date,m.giorno).split(' ').slice(1).join(' ')+'</div>'}</div>
    <div class="side away">
      <span class="tn ${played&&m.goalOut>=m.goalIn?'winner':''}">${m.teamOut?teamLink(m.teamOut):'<span class="muted">—</span>'}</span>
      <span class="gir">${esc(m.giornata)}</span>
    </div>
    <div class="foot">
      <span>📅 ${fmtDate(m.date,m.giorno)} · ${esc(m.orario||'')}</span>
      <span>${tav?'<span class="tav">⚖︎ a tavolino</span>':(m.campo?esc(m.campo.replace('Campo ','')):'')}</span>
    </div>
  </div>`;
}

function renderCal(){
  if(!$('#calBody')) return;
  const mdSeg=document.querySelector('#mdSeg .on');
  const md=mdSeg?mdSeg.dataset.md:'';
  const gir=$('#girFilter')?$('#girFilter').value:'';
  let ms=RAW.matches.filter(m=>(!md||m.giornata===md)&&(!gir||(m.girone||'').replace(/\s/g,'').includes(gir)));
  // group by giornata
  const byMd={};
  ms.forEach(m=>{(byMd[m.giornata]=byMd[m.giornata]||[]).push(m);});
  const order=[...GROUP_MD,...KO_ORDER];
  let html='';
  for(const g of order){
    if(!byMd[g]) continue;
    const lab=GROUP_MD.includes(g)?'Giornata '+g:g;
    html+=`<div class="matchday"><div class="md-label"><h3>${esc(lab)}</h3><span class="ln"></span><span class="muted" style="font-family:var(--font-u);font-size:12px">${byMd[g].length} partite</span></div><div class="match-list">${byMd[g].map(matchCard).join('')}</div></div>`;

}

function viewTabellone(){
  const ko={};
  KO_ORDER.forEach(r=>ko[r]=RAW.matches.filter(m=>m.giornata===r));
  function tieCard(m,placeholderA,placeholderB){
    const aP=m.played, aw=aP&&m.goalIn>m.goalOut, bw=aP&&m.goalOut>m.goalIn;
    const A=m.teamIn||placeholderA, B=m.teamOut||placeholderB;
    const tbdA=!m.teamIn, tbdB=!m.teamOut;
    return `<div class="tie">
      <div class="t ${aw?'adv':''} ${tbdA?'tbdname':''}">${tbdA?esc(A):teamLink(A)}<span class="sc">${aP?m.goalIn:'–'}</span></div>
      <div class="t ${bw?'adv':''} ${tbdB?'tbdname':''}">${tbdB?esc(B):teamLink(B)}<span class="sc">${aP?m.goalOut:'–'}</span></div>
      <div class="when">📅 ${fmtDate(m.date,m.giorno)} · 🕗 ${esc(m.orario)}</div>
    </div>`;
  }
  const oct=ko['Ottavi di finale'].map(m=>tieCard(m)).join('');
  const qf=ko['Quarti di finale'].map((m,i)=>tieCard(m,`Vincente Ottavo ${i*2+1}`,`Vincente Ottavo ${i*2+2}`)).join('');
  const sf=ko['Semifinale'].map((m,i)=>tieCard(m,`Vincente Quarto ${i*2+1}`,`Vincente Quarto ${i*2+2}`)).join('');
  const f3=ko['Finale 3°- 4°'].map(m=>tieCard(m,'Perdente Semifinale 1','Perdente Semifinale 2')).join('');
  const f1=ko['Finale 1°- 2°'].map(m=>`<div class="tie final-card">
      <div style="text-align:center;padding:8px 0 4px;font-family:var(--font-d);font-size:14px;color:var(--gold);letter-spacing:.05em">🏆 FINALISSIMA</div>
      ${tieCard(m,'Vincente Semifinale 1','Vincente Semifinale 2').replace('<div class="tie">','<div>').replace(/<\/div>$/,'')}
    </div>`).join('');
  return `
  <section class="view">
    <div class="eyebrow">Tabellone provvisorio · 16 qualificate</div>
    <h1 class="page">Fasi Finali</h1>
    <p class="page-sub">Dagli ottavi alla finalissima. Gli accoppiamenti degli ottavi sono provvisori e basati sulle posizioni attuali; quarti, semifinali e finali si completano con i risultati.</p>
    <div class="panel" style="padding:24px;margin-top:24px">
      <div class="bracket">
        <div class="round"><div class="round-h">Ottavi</div>${oct}</div>
        <div class="round"><div class="round-h">Quarti</div>${qf}</div>
        <div class="round"><div class="round-h">Semifinali</div>${sf}</div>
        <div class="round"><div class="round-h">Finali</div>${f1}<div style="height:6px"></div>${f3}</div>
      </div>
    </div>
  </section>`;
}

function viewStatistiche(){
  const st=Object.values(DB.stat).filter(s=>s.G>0);
  const played=DB.played;
  // goals per matchday
  const gpm={}; GROUP_MD.forEach(g=>gpm[g]=0);
  played.forEach(m=>{gpm[m.giornata]=(gpm[m.giornata]||0)+m.goalIn+m.goalOut;});
  // outcomes
  let homeW=0,awayW=0,draw=0;
  played.forEach(m=>{if(m.goalIn>m.goalOut)homeW++;else if(m.goalOut>m.goalIn)awayW++;else draw++;});
  // best attack/defense
  const attack=st.slice().sort((a,b)=>b.GF-a.GF).slice(0,8);
  const defense=st.slice().sort((a,b)=>a.GS-b.GS||b.G-a.G).slice(0,8);
  // biggest win
  const big=played.slice().sort((a,b)=>Math.abs(b.goalIn-b.goalOut)-Math.abs(a.goalIn-a.goalOut))[0];
  const mostGoalsMatch=played.slice().sort((a,b)=>(b.goalIn+b.goalOut)-(a.goalIn+a.goalOut))[0];
  // discipline
  const disc=st.slice().filter(s=>s.Y+s.R>0).sort((a,b)=>(b.Y+b.R*2)-(a.Y+a.R*2)).slice(0,6);

  const maxGpm=Math.max(...Object.values(gpm),1);
  const maxAtt=attack[0].GF;
  return `
  <section class="view">
    <div class="eyebrow">Numeri & tendenze</div>
    <h1 class="page">Statistiche</h1>
    <p class="page-sub">Analisi sui ${played.length} match di girone disputati · ${DB.totGoals} gol complessivi.</p>

    <div class="kpi-row" style="margin-top:24px">
      <div class="kpi" style="--accent:var(--gold)"><div class="n">${(DB.totGoals/played.length).toFixed(1)}</div><div class="l">Media gol/partita</div></div>
      <div class="kpi" style="--accent:var(--win)"><div class="n">${big.goalIn>big.goalOut?big.goalIn-big.goalOut:big.goalOut-big.goalIn}</div><div class="l">Scarto record</div><div class="sub">${esc(big.teamIn)} ${big.goalIn}-${big.goalOut} ${esc(big.teamOut)}</div></div>
      <div class="kpi" style="--accent:var(--tang)"><div class="n">${mostGoalsMatch.goalIn+mostGoalsMatch.goalOut}</div><div class="l">Gol in una gara</div><div class="sub">${esc(mostGoalsMatch.teamIn)} – ${esc(mostGoalsMatch.teamOut)}</div></div>
      <div class="kpi" style="--accent:var(--rose)"><div class="n">${DB.totCards.y}<span style="font-size:18px;color:var(--ink-faint)">/${DB.totCards.r}</span></div><div class="l">Cartellini G/R</div></div>
    </div>

    <div class="stat-grid">
      <div class="panel chartcard">
        <h4>Gol per giornata</h4>
        <div class="cdesc">Reti totali segnate in ciascuna giornata di campionato</div>
        ${barChart(GROUP_MD.map(g=>({label:'G'+g,value:gpm[g]||0})),maxGpm)}
      </div>
      <div class="panel chartcard">
        <h4>Esito delle partite</h4>
        <div class="cdesc">Vittorie squadra "in casa" (Team IN), trasferta e pareggi</div>
        ${donutChart([{label:'Vitt. Team IN',value:homeW,color:'var(--pitch)'},{label:'Vitt. Team OUT',value:awayW,color:'var(--tang)'},{label:'Pareggi',value:draw,color:'var(--draw)'}])}
      </div>
      <div class="panel chartcard">
        <h4>Migliori attacchi</h4>
        <div class="cdesc">Top 8 squadre per gol fatti</div>
        ${hbarChart(attack.map(s=>({label:s.team,value:s.GF})),maxAtt)}
      </div>
      <div class="panel chartcard">
        <h4>Migliori difese</h4>
        <div class="cdesc">Top 8 squadre per gol subiti (meno è meglio)</div>
        <ul class="leaderlist">${defense.map((s,i)=>`<li><span class="lrank">${i+1}</span><span class="lname">${teamLink(s.team)}</span><span class="muted" style="font-size:12px;margin-right:8px">${s.G}g</span><span class="lval" style="color:var(--win)">${s.GS}</span></li>`).join('')}</ul>
      </div>
      <div class="panel chartcard">
        <h4>Fair play — più cartellini</h4>
        <div class="cdesc">Squadre per indice disciplinare (giallo 1 · rosso 2)</div>
        ${disc.length?`<ul class="leaderlist">${disc.map((s,i)=>`<li><span class="lrank">${i+1}</span><span class="lname">${teamLink(s.team)}</span><span style="display:flex;gap:6px;font-family:var(--font-u);font-size:12px"><span style="color:var(--draw)">🟨 ${s.Y}</span><span style="color:var(--loss)">🟥 ${s.R}</span></span></li>`).join('')}</ul>`:'<div class="muted">Nessun cartellino</div>'}
      </div>
      <div class="panel chartcard">
        <h4>Rendimento gironi</h4>
        <div class="cdesc">Media gol fatti per partita, per girone</div>
        ${(()=>{const gg={};Object.keys(DB.groups).forEach(g=>{const ts=DB.groups[g].map(n=>DB.stat[n]);const gf=ts.reduce((a,b)=>a+b.GF,0);const games=ts.reduce((a,b)=>a+b.G,0);gg[g]=games?gf/games:0;});const mx=Math.max(...Object.values(gg),1);return barChart(Object.keys(gg).sort().map(g=>({label:g,value:+gg[g].toFixed(1)})),mx,true);})()}
      </div>
    </div>
  </section>`;
}

/* ---------- SVG CHARTS (hand-built) ---------- */
function barChart(data,max,decimals){
  const W=320,H=160,pad=26,bw=(W-pad*2)/data.length;
  let bars=data.map((d,i)=>{
    const h=max?(d.value/max)*(H-pad-22):0, x=pad+i*bw+bw*0.18, y=H-pad-h, w=bw*0.64;
    return `<rect class="abar" x="${x.toFixed(1)}" y="${(H-pad).toFixed(1)}" width="${w.toFixed(1)}" height="0" data-y="${y.toFixed(1)}" data-h="${h.toFixed(1)}" rx="4" fill="url(#bg1)"/>
      <text x="${(x+w/2).toFixed(1)}" y="${(y-6).toFixed(1)}" text-anchor="middle" font-size="13" font-weight="700" fill="var(--ink)" class="bval" style="opacity:0">${decimals?d.value:d.value}</text>
      <text x="${(x+w/2).toFixed(1)}" y="${H-pad+15}" text-anchor="middle" font-size="11">${esc(d.label)}</text>`;
  }).join('');
  return `<svg viewBox="0 0 ${W} ${H}" width="100%"><defs><linearGradient id="bg1" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="var(--tang)"/><stop offset="1" stop-color="var(--rose)"/></linearGradient></defs>
    <line class="axis" x1="${pad}" y1="${H-pad}" x2="${W-pad+6}" y2="${H-pad}"/>${bars}</svg>`;
}
function hbarChart(data,max){
  const W=340,rowH=30,H=data.length*rowH+8,labW=128;
  let rows=data.map((d,i)=>{
    const w=max?(d.value/max)*(W-labW-44):0, y=i*rowH+6;
    return `<text x="${labW-8}" y="${y+15}" text-anchor="end" font-size="12.5" fill="var(--ink)" font-weight="600">${esc(d.label.length>16?d.label.slice(0,15)+'…':d.label)}</text>
      <rect x="${labW}" y="${y+4}" width="${(W-labW-44)}" height="14" rx="7" fill="rgba(255,255,255,.05)"/>
      <rect class="hbar" x="${labW}" y="${y+4}" width="0" data-w="${w.toFixed(1)}" height="14" rx="7" fill="url(#bg2)"/>
      <text x="${W-36}" y="${y+15}" font-size="13" font-weight="700" fill="var(--gold)">${d.value}</text>`;
  }).join('');
  return `<svg viewBox="0 0 ${W} ${H}" width="100%"><defs><linearGradient id="bg2" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="var(--tang)"/><stop offset="1" stop-color="var(--gold)"/></linearGradient></defs>${rows}</svg>`;
}
function donutChart(data){
  const tot=data.reduce((s,d)=>s+d.value,0)||1, R=58,r=36,cx=72,cy=72;
  let a=-Math.PI/2, segs='';
  data.forEach(d=>{
    const ang=d.value/tot*Math.PI*2, a2=a+ang;
    const x1=cx+R*Math.cos(a),y1=cy+R*Math.sin(a),x2=cx+R*Math.cos(a2),y2=cy+R*Math.sin(a2);
    const xi2=cx+r*Math.cos(a2),yi2=cy+r*Math.sin(a2),xi1=cx+r*Math.cos(a),yi1=cy+r*Math.sin(a);
    const large=ang>Math.PI?1:0;
    segs+=`<path d="M${x1.toFixed(2)} ${y1.toFixed(2)} A${R} ${R} 0 ${large} 1 ${x2.toFixed(2)} ${y2.toFixed(2)} L${xi2.toFixed(2)} ${yi2.toFixed(2)} A${r} ${r} 0 ${large} 0 ${xi1.toFixed(2)} ${yi1.toFixed(2)} Z" fill="${d.color}" opacity=".92"/>`;
    a=a2;
  });
  const legend=data.map(d=>`<div style="display:flex;align-items:center;gap:7px;font-family:var(--font-u);font-size:12.5px;margin:4px 0"><span style="width:11px;height:11px;border-radius:3px;background:${d.color}"></span><span style="flex:1">${esc(d.label)}</span><b>${d.value}</b> <span class="muted">(${Math.round(d.value/tot*100)}%)</span></div>`).join('');
  return `<div style="display:flex;gap:18px;align-items:center;flex-wrap:wrap"><svg viewBox="0 0 144 144" width="144" height="144" style="flex-shrink:0">${segs}<text x="72" y="68" text-anchor="middle" font-size="22" font-weight="700" font-family="var(--font-d)" fill="var(--ink)">${tot}</text><text x="72" y="84" text-anchor="middle" font-size="10" fill="var(--ink-faint)">PARTITE</text></svg><div style="flex:1;min-width:140px">${legend}</div></div>`;
}

/* ---------- ANIMATIONS ---------- */
function animateBars(){
  document.querySelectorAll('.prog>i,[data-w]').forEach(i=>{if(i.dataset.w&&i.tagName==='I'){setTimeout(()=>i.style.width=i.dataset.w,60);}});
  document.querySelectorAll('.goalbar>i,.kpi .prog>i').forEach(i=>{if(i.dataset.w)setTimeout(()=>i.style.width=i.dataset.w,80);});
  document.querySelectorAll('rect.abar').forEach((r,i)=>{r.style.transition='all .7s cubic-bezier(.2,.8,.2,1)';setTimeout(()=>{r.setAttribute('y',r.dataset.y);r.setAttribute('height',r.dataset.h);const t=r.nextElementSibling;if(t&&t.classList.contains('bval'))t.style.transition='opacity .5s',t.style.opacity='1';},80+i*60);});
  document.querySelectorAll('rect.hbar').forEach((r,i)=>{r.style.transition='width .7s cubic-bezier(.2,.8,.2,1)';setTimeout(()=>r.setAttribute('width',r.dataset.w),80+i*50);});
}

/* ---------- THEME ---------- */
function applyTheme(t){
  document.documentElement.setAttribute('data-theme',t);
  const ic=$('#themeIc'); if(ic){ic.textContent=t==='light'?'☀️':'🌙';}
  const btn=$('#themeBtn'); if(btn){btn.title=t==='light'?'Passa al tema scuro (T)':'Passa al tema chiaro (T)';}
  try{localStorage.setItem('pwc-arena-theme',t);}catch(e){}
}
function toggleTheme(){
  const cur=document.documentElement.getAttribute('data-theme')==='light'?'light':'dark';
  applyTheme(cur==='light'?'dark':'light');
}

/* ---------- SEARCH ---------- */
let searchIndex=[],selIdx=0;
function buildIndex(){
  searchIndex=[];
  Object.keys(DB.teams).forEach(n=>searchIndex.push({type:'squadra',label:n,sub:'Girone '+DB.teams[n].group,go:'/squadre/'+slug(n),ic:initials(n),style:crestStyle(n)}));
  RAW.scorers.forEach(()=>{});
  const seen=new Set();
  RAW.scorers.forEach(r=>{if(!seen.has(r.player)){seen.add(r.player);searchIndex.push({type:'giocatore',label:nameFromEmail(r.player),sub:r.squadra,go:'/squadre/'+slug(r.squadra),ic:'⚽',style:'background:rgba(255,255,255,.08)'});}});
}
function openSearch(){$('#searchModal').classList.add('open');$('#searchInput').value='';$('#searchInput').focus();renderSearch('');}
function closeSearch(){$('#searchModal').classList.remove('open');}
function renderSearch(q){
  q=q.trim().toLowerCase(); selIdx=0;
  let res=q?searchIndex.filter(x=>x.label.toLowerCase().includes(q)||x.sub.toLowerCase().includes(q)):searchIndex.filter(x=>x.type==='squadra');
  res=res.slice(0,30);
  $('#searchResults').innerHTML=res.length?res.map((x,i)=>`<div class="res ${i===0?'sel':''}" data-go="${x.go}"><div class="ic" style="${x.style};color:#04130b">${x.type==='squadra'?x.ic:'⚽'}</div><div><div class="rt">${esc(x.label)}</div><div class="rs">${esc(x.sub)}</div></div><span class="kind">${x.type}</span></div>`).join(''):'<div class="empty">Nessun risultato</div>';
  $('#searchResults').querySelectorAll('.res').forEach(r=>r.onclick=()=>{go(r.dataset.go);closeSearch();});
}

/* ---------- EVENTS ---------- */
document.addEventListener('keydown',e=>{
  if(e.key==='/'&&!/INPUT|TEXTAREA/.test(document.activeElement.tagName)){e.preventDefault();openSearch();}
  if((e.key==='t'||e.key==='T')&&!/INPUT|TEXTAREA/.test(document.activeElement.tagName)&&!$('#searchModal').classList.contains('open')){toggleTheme();}
  if(e.key==='Escape')closeSearch();
  if($('#searchModal').classList.contains('open')){
    const items=[...$('#searchResults').querySelectorAll('.res')];
    if(!items.length)return;
    if(e.key==='ArrowDown'){e.preventDefault();selIdx=Math.min(selIdx+1,items.length-1);}
    if(e.key==='ArrowUp'){e.preventDefault();selIdx=Math.max(selIdx-1,0);}
    if(e.key==='Enter'){e.preventDefault();items[selIdx]&&items[selIdx].click();return;}
    items.forEach((it,i)=>it.classList.toggle('sel',i===selIdx));
    items[selIdx]&&items[selIdx].scrollIntoView({block:'nearest'});
  }
});
document.addEventListener('input',e=>{if(e.target.id==='searchInput')renderSearch(e.target.value);});
document.addEventListener('click',e=>{
  if(e.target.closest('#mdSeg button')){const b=e.target.closest('button');b.parentElement.querySelectorAll('button').forEach(x=>x.classList.remove('on'));b.classList.add('on');renderCal();}
});
document.addEventListener('change',e=>{if(e.target.id==='girFilter')renderCal();});
window.addEventListener('scroll',()=>{$('#scrollTop').classList.toggle('show',scrollY>500);});

/* delegate calendario re-render after route render */
const _router=router;
router=function(){_router();if(location.hash.includes('calendario'))requestAnimationFrame(renderCal);};
window.removeEventListener('hashchange',_router);
window.addEventListener('hashchange',router);

/* ---------- INIT ---------- */
applyTheme(document.documentElement.getAttribute('data-theme')||'dark');
compute();
buildNav();
buildIndex();
$('#foot-stamp').textContent='Aggiornato '+new Date().toLocaleDateString('it-IT',{day:'numeric',month:'long',year:'numeric'});
router();
window.go=go;window.openSearch=openSearch;window.closeSearch=closeSearch;window.toggleTheme=toggleTheme;
</script>
